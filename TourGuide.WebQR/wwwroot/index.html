<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinh Khánh Food Tour</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f8f9fa;
        }

        .poi-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .image-header {
            width: 100%;
            height: 250px;
            background-color: #eee;
            display: none;
        }

            .image-header img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        .content {
            padding: 25px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #333;
            margin-bottom: 5px;
        }

        #poi-description {
            color: #555;
            font-size: 15px;
            margin-bottom: 20px;
            text-align: justify;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        #loading-msg {
            text-align: center;
            padding: 50px;
            color: #666;
            font-size: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

            .btn:active {
                transform: scale(0.95);
            }

        .btn-map {
            background: #2196F3;
        }

        .audio-panel {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #e9ecef;
        }

        .lang-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ced4da;
            margin-bottom: 15px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }

        .btn-play {
            background: #4CAF50;
        }

        .btn-pause {
            background: #FF9800;
        }
    </style>
</head>
<body>

    <div class="poi-container">
        <div id="loading-msg">Đang tải thông tin quán...</div>

        <div id="main-content" style="display: none;">
            <div class="image-header" id="img-container">
                <img id="poi-image" src="" alt="Ảnh quán">
            </div>

            <div class="content">
                <h1 id="poi-name">Tên Quán</h1>

                <div class="action-buttons">
                    <a href="#" id="map-btn" target="_blank" class="btn btn-map">🗺️ Chỉ đường Map</a>
                </div>

                <div class="audio-panel">
                    <select id="lang-select" class="lang-select" onchange="updateDisplayedText()">
                        <option value="vi-VN">🇻🇳 Tiếng Việt (Vietnamese)</option>
                        <option value="en-US">🇬🇧 Tiếng Anh (English)</option>
                        <option value="ko-KR">🇰🇷 Tiếng Hàn (Korean)</option>
                        <option value="ja-JP">🇯🇵 Tiếng Nhật (Japanese)</option>
                        <option value="zh-CN">🇨🇳 Tiếng Trung (Chinese)</option>
                    </select>

                    <p id="poi-description">Đang tải nội dung...</p>

                    <div class="action-buttons">
                        <button class="btn btn-play" onclick="playAudio()">▶ Nghe Thuyết Minh</button>
                        <button class="btn btn-pause" onclick="pauseAudio()" id="pause-btn">⏸ Tạm dừng</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://localhost:7095";
        let currentPoiData = null;

        async function loadPOIData() {
            const urlParams = new URLSearchParams(window.location.search);
            const poiId = urlParams.get('id');

            if (!poiId) return document.getElementById('loading-msg').innerText = "Mã QR không hợp lệ.";

            try {
                const response = await fetch(`${API_BASE_URL}/api/POI/${poiId}`);
                if (!response.ok) throw new Error("Không tìm thấy dữ liệu.");

                currentPoiData = await response.json();

                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('poi-name').innerText = currentPoiData.name;

                // Tự động tạo link Google Maps nếu có tọa độ (Lon, Lat)
                if (currentPoiData.location && currentPoiData.location.coordinates) {
                    const lon = currentPoiData.location.coordinates[0];
                    const lat = currentPoiData.location.coordinates[1];
                    // Google Maps format: lat, lon
                    document.getElementById('map-btn').href = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
                } else {
                    document.getElementById('map-btn').style.display = 'none';
                }

                if (currentPoiData.imageUrl) {
                    document.getElementById('poi-image').src = `${API_BASE_URL}${currentPoiData.imageUrl}`;
                    document.getElementById('img-container').style.display = 'block';
                }

                updateDisplayedText(); // Load text lúc mới vào trang
            } catch (error) {
                document.getElementById('loading-msg').innerText = "Lỗi kết nối: " + error.message;
            }
        }

        function updateDisplayedText() {
            if (!currentPoiData) return;
            const lang = document.getElementById('lang-select').value;
            let text = "";

            // Chọn trường mô tả dựa vào mã ngôn ngữ
            if (lang === 'vi-VN') text = currentPoiData.description_VI;
            else if (lang === 'en-US') text = currentPoiData.description_EN;
            else if (lang === 'ko-KR') text = currentPoiData.description_KO;
            else if (lang === 'ja-JP') text = currentPoiData.description_JA;
            else if (lang === 'zh-CN') text = currentPoiData.description_ZH;

            document.getElementById('poi-description').innerText = text || "(Chưa có bài thuyết minh cho ngôn ngữ này)";
            window.speechSynthesis.cancel(); // Tự tắt tiếng nếu khách đổi ngôn ngữ
            document.getElementById('pause-btn').innerText = "⏸ Tạm dừng";
        }

        function playAudio() {
            if (!('speechSynthesis' in window)) return alert("Trình duyệt không hỗ trợ Audio.");

            const textToRead = document.getElementById('poi-description').innerText;
            if (textToRead === "(Chưa có bài thuyết minh cho ngôn ngữ này)") return;

            const lang = document.getElementById('lang-select').value;
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = lang;
            utterance.rate = 0.9;

            // Ép tìm đúng giọng đọc bản địa
            const voices = window.speechSynthesis.getVoices();
            const voicePrefix = lang.split('-')[0];
            const selectedVoice = voices.find(voice => voice.lang.startsWith(voicePrefix));

            if (selectedVoice) utterance.voice = selectedVoice;

            utterance.onend = () => document.getElementById('pause-btn').innerText = "⏸ Tạm dừng";

            window.speechSynthesis.speak(utterance);
        }

        function pauseAudio() {
            if (window.speechSynthesis.speaking) {
                const btn = document.getElementById('pause-btn');
                if (window.speechSynthesis.paused) {
                    window.speechSynthesis.resume();
                    btn.innerText = "⏸ Tạm dừng";
                } else {
                    window.speechSynthesis.pause();
                    btn.innerText = "▶ Phát tiếp";
                }
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
        window.onload = loadPOIData;
    </script>
</body>
</html>
